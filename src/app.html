<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual" />
		<meta name="theme-color" content="#8B1A1A" />
		<meta name="description" content="Anki-jin — Impara il giapponese con le flashcard" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/Icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Anki-jin" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<link rel="preload" href="/fonts/KleeOne-Regular.subset.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/KleeOne-SemiBold.subset.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Resolve viewport + safe-area values synchronously before first paint.
		     iOS standalone PWA otherwise leaves env(safe-area-inset-*) and 100dvh
		     "stuck" at incorrect values until the first user interaction. -->
		<script>
			(function () {
				var root = document.documentElement;
				root.style.setProperty('--app-height', window.innerHeight + 'px');

				// Probe env() values via a hidden element and mirror to CSS vars.
				var probe = document.createElement('div');
				probe.style.cssText =
					'position:fixed;top:0;left:0;visibility:hidden;pointer-events:none;' +
					'height:env(safe-area-inset-bottom);width:env(safe-area-inset-top);';
				function attach() {
					(document.body || document.documentElement).appendChild(probe);
					read();
				}
				function read() {
					var sb = probe.offsetHeight;
					var st = probe.offsetWidth;
					root.style.setProperty('--safe-bottom', sb + 'px');
					root.style.setProperty('--safe-top', st + 'px');
				}
				if (document.body) attach();
				else document.addEventListener('DOMContentLoaded', attach, { once: true });
				// iOS sometimes resolves env() one frame late — re-read.
				requestAnimationFrame(read);
				setTimeout(read, 200);
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
